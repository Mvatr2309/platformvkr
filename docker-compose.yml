services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://vkr_user:vkr_password@db:5432/vkr?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=vkr
      - POSTGRES_USER=vkr_user
      - POSTGRES_PASSWORD=vkr_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkr_user -d vkr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
